# WinGet Configuration — declarative dev environment setup
# Apply:    winget configure .\configuration.dsc.yaml
# Validate: winget configure validate .\configuration.dsc.yaml
# Requires: winget v1.6.2631 or later
properties:
  configurationVersion: 0.2.0

  # assertions: prerequisites that must hold before applying
  assertions:
    - resource: Microsoft.Windows.Developer/OsVersion
      directives:
        description: Require Windows 10 or later
        allowPrerelease: true
      settings:
        MinVersion: "10.0.19041"

  # resources: desired state
  # Policy: the dev environment lives inside WSL. Keep the Windows side minimal
  #         (editor, terminal, WSL itself). Git / Node / language runtimes are
  #         managed inside the WSL distro with Nix via takuyaa/dotfiles
  #         (Home Manager). See README "WSL distro init". This resource installs
  #         the WSL feature only — distro + tooling are set up inside WSL.
  resources:
    # WSL itself (installs Ubuntu by default)
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: wsl
      directives:
        description: Install Windows Subsystem for Linux
      settings:
        id: Microsoft.WSL
        source: winget

    # A single VS Code on the Windows side; connect into WSL via the WSL extension.
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: vscode
      directives:
        description: Install Visual Studio Code (connect to WSL via the WSL extension)
      settings:
        id: Microsoft.VisualStudioCode
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: windows-terminal
      directives:
        description: Install Windows Terminal
      settings:
        id: Microsoft.WindowsTerminal
        source: winget

    # Git on the Windows side, only to clone / pull THIS dotfiles repo (the kanata
    # config + this winget file live in it). Dev-time Git lives inside WSL via Nix.
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: git
      directives:
        description: Install Git for Windows (to pull this dotfiles repo)
      settings:
        id: Git.Git
        source: winget

    # Global Git identity for commits made from the Windows host itself (e.g.
    # editing this windows/ layer in C:\Users\takuy\dotfiles). Dev-time Git
    # inside WSL gets its identity from Nix/Home Manager (home-common.nix);
    # the Windows host is separate, so without this `git commit` here fails
    # with "Author identity unknown". Writes %USERPROFILE%\.gitconfig.
    # git.exe is resolved explicitly because PATH may not refresh within a
    # single `winget configure` run right after the Git package installs.
    - resource: PSDscResources/Script
      id: git-identity
      dependsOn:
        - git
      directives:
        description: Set the global Git identity on the Windows host
      settings:
        GetScript: |
          $git = (Get-Command git -ErrorAction SilentlyContinue).Source
          @{ Result = if ($git) { & $git config --global user.email } else { '' } }
        TestScript: |
          $git = (Get-Command git -ErrorAction SilentlyContinue).Source
          if (-not $git) {
            foreach ($p in @("$env:ProgramFiles\Git\cmd\git.exe", "${env:ProgramFiles(x86)}\Git\cmd\git.exe", "$env:LOCALAPPDATA\Programs\Git\cmd\git.exe")) {
              if (Test-Path $p) { $git = $p; break }
            }
          }
          if (-not $git) { return $false }
          $name  = & $git config --global user.name  2>$null
          $email = & $git config --global user.email 2>$null
          ($name -eq 'Takuya Asano') -and ($email -eq 'takuya.a@gmail.com')
        SetScript: |
          $git = (Get-Command git -ErrorAction SilentlyContinue).Source
          if (-not $git) {
            foreach ($p in @("$env:ProgramFiles\Git\cmd\git.exe", "${env:ProgramFiles(x86)}\Git\cmd\git.exe", "$env:LOCALAPPDATA\Programs\Git\cmd\git.exe")) {
              if (Test-Path $p) { $git = $p; break }
            }
          }
          if (-not $git) { throw "git executable not found; ensure the Git package installed" }
          & $git config --global user.name  'Takuya Asano'
          & $git config --global user.email 'takuya.a@gmail.com'

    # Already-installed Chrome is detected and left as-is (no uninstall needed).
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: chrome
      directives:
        description: Install Google Chrome
      settings:
        id: Google.Chrome
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: onepassword
      directives:
        description: Install 1Password
      settings:
        id: AgileBits.1Password
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: powertoys
      directives:
        description: Install Microsoft PowerToys
      settings:
        id: Microsoft.PowerToys
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: discord
      directives:
        description: Install Discord
      settings:
        id: Discord.Discord
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: mtga
      directives:
        description: Install Magic The Gathering Arena launcher
      settings:
        id: WizardsoftheCoast.MTGALauncher
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: steam
      directives:
        description: Install Steam
      settings:
        id: Valve.Steam
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: etcher
      directives:
        description: Install balenaEtcher
      settings:
        id: Balena.Etcher
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: slack
      directives:
        description: Install Slack
      settings:
        id: SlackTechnologies.Slack
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: claude
      directives:
        description: Install Claude desktop app
      settings:
        id: Anthropic.Claude
        source: winget

    # Tailscale on the Windows host. Combined with networkingMode=mirrored in
    # .wslconfig (see the wslconfig resource below), this gives WSL access to the
    # tailnet, so `ssh dev` reaches the homelab over Tailscale. After install,
    # sign in once via the Tailscale GUI / `tailscale up` to join the tailnet.
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: tailscale
      directives:
        description: Install Tailscale (WSL reaches the tailnet via mirrored networking)
      settings:
        id: tailscale.tailscale
        source: winget

    # Google Japanese IME — robust key customization for the 英数/かな
    # mode keys (Muhenkan = IME off, Henkan = ひらがな). See README for the
    # exact key-setting steps to apply after install.
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: google-japanese-ime
      directives:
        description: Install Google Japanese IME
      settings:
        id: Google.JapaneseIME
        source: winget

    # kanata: advanced remapper for layers / tap-hold (e.g. Muhenkan layer).
    # Config lives in kanata.kbd next to this file. Verify the id with
    # `winget search kanata` if install fails.
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: kanata
      directives:
        description: Install kanata (GUI build — no console window, same CLI args)
      settings:
        id: jtroo.kanata_gui
        source: winget

    # ---- Keyboard customization ----
    # Use the physical JP keyboard as a US layout by substituting the Japanese
    # keyboard layout (00000411) with US (00000409) for the current user.
    # This is layout-level (works on USB/HID), unlike the old i8042prt
    # "LayerDriver JP106 = kbd101.dll" method which only affects PS/2 keyboards.
    # Takes effect after sign-out / sign-in.
    # (IME switching is handled by kanata emitting F13/F14 — layout-independent —
    #  bound in keymap.txt; see kanata.kbd.)
    - resource: PSDscResources/Registry
      id: kbd-layout-us
      directives:
        description: Substitute the JP keyboard layout with US for this user
      settings:
        Key: HKEY_CURRENT_USER\Keyboard Layout\Substitutes
        ValueName: "00000411"
        ValueType: String
        ValueData: "00000409"
        Ensure: Present
        Force: true

    # Remap CapsLock (0x3A) -> Left Ctrl (0x1D) via a Scancode Map.
    # Binary layout: 8-byte header, DWORD count (2 = 1 mapping + null),
    # mapping WORD pair (to=1D00, from=3A00), 4-byte null terminator.
    # Applies system-wide incl. the login screen; requires a reboot.
    - resource: PSDscResources/Registry
      id: kbd-scancode-map
      directives:
        description: Remap CapsLock to Left Ctrl
      settings:
        Key: HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Keyboard Layout
        ValueName: Scancode Map
        ValueType: Binary
        ValueData: "0000000000000000020000001D003A0000000000"
        Ensure: Present
        Force: true

    # Auto-start kanata at logon via a scheduled task.
    # Runs as the current user with an interactive token (no stored password)
    # and highest privileges, which kanata needs to install its keyboard hook.
    # NOTE: if a game/app misbehaves while kanata runs elevated, change
    #       -RunLevel Highest to Limited below and re-apply.
    - resource: PSDscResources/Script
      id: kanata-autostart
      dependsOn:
        - kanata
      directives:
        description: Register a logon scheduled task that starts kanata
      settings:
        GetScript: |
          @{ Result = (Get-ScheduledTask -TaskName 'kanata' -ErrorAction SilentlyContinue).TaskName }
        # Not just "does the task exist" -- also verify it points at THIS repo's
        # kanata.kbd. An older setup once registered the task against a stale copy
        # (C:\Users\takuy\Claude\Projects\...\kanata.kbd), so edits to the repo
        # config had no effect and an existence-only test never re-registered it.
        # Returning $false on a wrong --cfg path makes re-applying self-heal it.
        TestScript: |
          $t = Get-ScheduledTask -TaskName 'kanata' -ErrorAction SilentlyContinue
          if (-not $t) { return $false }
          $cfg = 'C:\Users\takuy\dotfiles\windows\kanata.kbd'
          [bool]($t.Actions | Where-Object { $_.Arguments -like ('*"{0}"*' -f $cfg) })
        SetScript: |
          $exe = $null
          # winget exposes the canonical command as a shim under Links.
          $linkDirs = @("$env:LOCALAPPDATA\Microsoft\WinGet\Links", "$env:ProgramFiles\WinGet\Links")
          foreach ($d in $linkDirs) {
            if (Test-Path $d) {
              $f = Get-ChildItem -Path $d -Filter 'kanata*.exe' -ErrorAction SilentlyContinue |
                   Sort-Object { $_.Name -notmatch 'gui' } | Select-Object -First 1
              if ($f) { $exe = $f.FullName; break }
            }
          }
          # Fallback: search the extracted package payload, preferring a GUI build.
          if (-not $exe) {
            $pkgDirs = @("$env:LOCALAPPDATA\Microsoft\WinGet\Packages", "$env:ProgramFiles\WinGet\Packages")
            foreach ($d in $pkgDirs) {
              if (Test-Path $d) {
                $f = Get-ChildItem -Path $d -Filter 'kanata*.exe' -Recurse -ErrorAction SilentlyContinue |
                     Sort-Object { $_.Name -notmatch 'gui' } | Select-Object -First 1
                if ($f) { $exe = $f.FullName; break }
              }
            }
          }
          if (-not $exe) { throw "kanata executable not found under WinGet package directories" }
          $cfg = "C:\Users\takuy\dotfiles\windows\kanata.kbd"
          $action    = New-ScheduledTaskAction -Execute $exe -Argument ('--cfg "{0}"' -f $cfg)
          $trigger   = New-ScheduledTaskTrigger -AtLogOn
          $principal = New-ScheduledTaskPrincipal -UserId $env:USERNAME -LogonType Interactive -RunLevel Highest
          $settings  = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries
          Register-ScheduledTask -TaskName 'kanata' -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force

    # ---- WSL networking ----
    # Deploy .wslconfig (networkingMode=mirrored) from this repo to %UserProfile%.
    # WSL only reads it from the fixed path %UserProfile%\.wslconfig, so we copy
    # rather than reference the repo path. The source of truth is windows/wslconfig.
    # Run `wsl --shutdown` after applying for the network mode change to take effect.
    - resource: PSDscResources/Script
      id: wslconfig
      directives:
        description: Deploy .wslconfig (mirrored networking) to the user profile
      settings:
        GetScript: |
          @{ Result = (Get-Content -Raw "$env:USERPROFILE\.wslconfig" -ErrorAction SilentlyContinue) }
        TestScript: |
          $src = 'C:\Users\takuy\dotfiles\windows\wslconfig'
          $dst = "$env:USERPROFILE\.wslconfig"
          if (-not (Test-Path $dst)) { return $false }
          (Get-FileHash $src).Hash -eq (Get-FileHash $dst).Hash
        SetScript: |
          $src = 'C:\Users\takuy\dotfiles\windows\wslconfig'
          $dst = "$env:USERPROFILE\.wslconfig"
          Copy-Item -Path $src -Destination $dst -Force
